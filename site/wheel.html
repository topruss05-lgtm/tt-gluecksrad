<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TT-Glücksrad</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/wheel.css">
</head>
<body class="text-gray-200 min-h-screen flex flex-col select-none"
      x-data="wheelApp()" x-init="init()" x-cloak>

    <!-- Confetti overlay -->
    <canvas x-ref="confettiCanvas" class="confetti-layer"></canvas>

    <!-- Header -->
    <header class="relative z-10 flex items-center justify-center py-3 shrink-0">
        <h1 class="font-['Fredoka'] text-base font-bold tracking-widest uppercase">
            <span class="text-white/70">Glücksrad</span>
        </h1>
    </header>

    <!-- Main — fixed layout, nothing shifts -->
    <div class="relative z-10 flex-1 flex flex-col items-center justify-center px-4 pb-5 min-h-0"
         :class="shaking ? 'do-shake' : ''">

        <!-- ══ BET SELECTION SCREEN (before spinning) ══ -->
        <div x-show="!betConfirmed" class="flex flex-col items-center justify-center gap-6 absolute inset-0 z-30 px-4"
             style="background: rgba(0,0,0,0.85);">

            <div class="font-['Fredoka'] text-2xl font-bold text-white/80 tracking-wide">Einsatz wählen</div>

            <!-- Chip buttons -->
            <div class="flex gap-4">
                <template x-for="n in [1, 2, 3]">
                    <button @click="bet = n"
                            class="w-20 h-20 rounded-full font-['Fredoka'] font-bold text-3xl transition-all duration-200"
                            :class="bet === n
                                ? 'bg-white/20 text-white border-[3px] border-white/50 scale-110 shadow-[0_0_20px_rgba(255,255,255,0.15)]'
                                : 'bg-white/5 text-white/30 border-2 border-white/10 hover:bg-white/10 hover:text-white/50'"
                            x-text="n"></button>
                </template>
            </div>

            <div class="text-white/30 text-base" x-text="bet === 1 ? '1 Chip setzen' : bet + ' Chips setzen'"></div>

            <!-- Confirm button -->
            <button @click="betConfirmed = true"
                    class="spin-btn px-16 py-4 text-white font-['Fredoka'] font-bold text-2xl tracking-wide mt-2">
                <span class="relative z-10">Spielen</span>
            </button>
        </div>

        <!-- ══ WHEEL (only interactive after bet confirmed) ══ -->
        <div class="wheel-stage shrink-0 mb-5"
             :class="{ 'is-spinning': spinning }"
             :style="!betConfirmed ? 'opacity:0.15;filter:blur(6px)' : 'opacity:1;filter:none'"
             x-ref="stage"
             @touchstart="onDown($event)"
             @touchmove.prevent="onMove($event)"
             @touchend="onUp()"
             @mousedown.prevent="onDown($event)"
             @mousemove="onMove($event)"
             @mouseup="onUp()"
             @mouseleave="onUp()">

            <div class="pointer-wrap" x-ref="pointerWrap">
                <svg width="44" height="56" viewBox="0 0 44 56" fill="none">
                    <path d="M22 54 L6 14 Q4 7 10 5 L34 5 Q40 7 38 14 Z" fill="#ff6b35"/>
                    <circle cx="22" cy="10" r="6" fill="#fff" opacity=".9"/>
                    <circle cx="22" cy="10" r="2.5" fill="#ff6b35"/>
                </svg>
            </div>

            <div class="wheel-rotate" :style="`transform:rotate(${rotation}deg)`">
                <canvas x-ref="wheelCanvas" class="wheel-canvas"></canvas>
            </div>

            <div class="center-ball"></div>
        </div>

        <!-- Spin hint + button (only after bet confirmed) -->
        <div class="h-[80px] flex flex-col items-center justify-center gap-1 shrink-0"
             x-show="betConfirmed">
            <p x-show="!spinning && !showResult && !showBallPick"
               class="text-white/20 text-xs">Dreh am Rad</p>
            <button @click="spin()" :disabled="spinning"
                    x-show="!showResult && !showBallPick && !spinning"
                    class="spin-btn px-14 py-3 text-white font-['Fredoka'] font-bold text-xl tracking-wide">
                <span class="relative z-10">Drehen</span>
            </button>
            <p x-show="spinning" class="text-white/20 text-sm animate-pulse">···</p>
        </div>
    </div>

    <!-- Result overlay -->
    <div x-show="showResult" x-transition.opacity.duration.300ms
         class="fixed inset-0 z-50 result-bg bg-black/50 flex items-center justify-center"
         @click="dismissResult()">
        <div class="result-card flex flex-col items-center text-center px-10 pt-10 pb-8 rounded-2xl max-w-[400px] w-[88vw] mx-4"
             :class="{
                 'rc-win': rType === 'win',
                 'rc-lose': rType === 'lose',
                 'rc-jackpot': rType === 'jackpot',
                 'rc-special': rType === 'special',
                 'rc-neutral': rType === 'neutral',
             }"
             @click.stop>

            <!-- Title -->
            <div class="result-title-anim font-['Fredoka'] text-5xl font-bold mb-1 text-white"
                 :class="rType === 'jackpot' ? 'gold-shimmer' : ''"
                 x-text="rTitle"></div>

            <!-- Subtitle -->
            <div class="result-msg-anim text-white/50 text-lg mb-5" x-html="rMsg"></div>

            <!-- CHIP COUNT (hidden for respin) -->
            <div x-show="rPay >= 0" class="mb-5">
                <div class="font-['Fredoka'] font-bold leading-none text-white"
                     :style="'font-size: ' + (rPay === 0 ? '5rem' : rPay >= 3 ? '7rem' : '6rem')">
                    <span x-text="rPay"></span>
                    <span class="text-[0.4em] ml-1 text-white/40">Chips</span>
                </div>
            </div>

            <!-- Bonus card: Steal OR Partner — same visual treatment, always centered -->
            <div x-show="rSteal || rPartner > 0"
                 class="result-bonus-anim w-full py-4 px-6 rounded-xl bg-black/20 border border-white/15 mb-6">
                <!-- Steal -->
                <template x-if="rSteal">
                    <div>
                        <div class="font-['Fredoka'] text-3xl font-bold text-white">…und klau dir 1 Chip</div>
                        <div class="text-white/40 text-base mt-1">Von wem?</div>
                    </div>
                </template>
                <!-- Partner -->
                <template x-if="rPartner > 0 && !rSteal">
                    <div>
                        <div class="font-['Fredoka'] text-3xl font-bold text-white">+<span x-text="rPartner"></span> Chip für Partner</div>
                        <div class="text-white/40 text-base mt-1">Wähl jemanden aus</div>
                    </div>
                </template>
            </div>

            <!-- Spacer when no bonus card -->
            <div x-show="!rSteal && rPartner === 0 && rPay >= 0" class="mb-2"></div>

            <!-- Continue -->
            <button @click="dismissResult()"
                    class="px-12 py-3 rounded-full border-2 border-white/25 text-white/70 text-xl font-['Fredoka'] font-bold
                           hover:border-white/50 hover:text-white transition">
                Weiter
            </button>
        </div>
    </div>

    <!-- Ball pick overlay (Doppelt oder Nix) -->
    <div x-show="showBallPick" x-transition.opacity.duration.250ms
         class="fixed inset-0 z-40 result-bg bg-black/50 flex flex-col items-center justify-center">
        <div class="font-['Fredoka'] text-5xl font-bold text-white mb-3">Doppelt oder Nix</div>
        <p class="text-white/40 text-xl mb-8">Wähl einen Ball</p>
        <div class="ball-pick-area">
            <!-- Ball 0 -->
            <div class="ball-container"
                 :class="{ 'revealed': ball0Revealed, 'picked': _pickedBallIdx === 0 }"
                 @click="pickBall(0)">
                <div class="ball-flipper">
                    <div class="ball-side ball-front">?</div>
                    <div class="ball-side ball-back"
                         :class="ballResults[0] ? 'is-win' : 'is-lose'"
                         x-text="ballResults[0] ? '×2' : '×0'"></div>
                </div>
                <div class="ball-shadow"></div>
            </div>
            <!-- Ball 1 -->
            <div class="ball-container"
                 :class="{ 'revealed': ball1Revealed, 'picked': _pickedBallIdx === 1 }"
                 @click="pickBall(1)">
                <div class="ball-flipper">
                    <div class="ball-side ball-front">?</div>
                    <div class="ball-side ball-back"
                         :class="ballResults[1] ? 'is-win' : 'is-lose'"
                         x-text="ballResults[1] ? '×2' : '×0'"></div>
                </div>
                <div class="ball-shadow"></div>
            </div>
        </div>
    </div>

    <!-- Scripts (order matters) -->
    <script src="js/wheel-config.js"></script>
    <script src="js/wheel-draw.js"></script>
    <script src="js/wheel-audio.js"></script>
    <script src="js/wheel-confetti.js"></script>
    <script src="js/wheel-pointer.js"></script>
    <script src="js/wheel-app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
